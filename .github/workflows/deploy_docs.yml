name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'docs/**'
      - 'Doxyfile'
      - '*.md'
      - '.github/workflows/deploy_docs.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout website branch
        uses: actions/checkout@v4
        with:
          ref: website
          path: website

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Build Doxygen Documentation
        run: |
          cd main
          doxygen Doxyfile

      - name: Copy Markdown files (Cherry pick)
        run: |
          cp main/*.md website/
          cp main/docs/ARCHITECTURE.md website/docs/ || true

      - name: Copy Doxygen Output to Website
        run: |
          # Clean old api docs and copy new ones
          rm -rf website/api
          cp -r main/docs/html website/api

      - name: Commit and Push to website
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: auto-deploy doxygen api and sync markdown files" || echo "No changes to commit"
          git push origin website
